<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Brand Guidelines"
  >

  <meta
    name="author"
    content="NINEWORKS"
  >

  <title>Brand Guidelines</title>

  <!-- 화면 및 A4 공통 스타일 -->
  <link
    rel="stylesheet"
    href="./css/guideline.css"
  >

  <!-- PDF 및 인쇄 스타일 -->
  <link
    rel="stylesheet"
    href="./css/print.css"
  >
</head>

<body>

  <!-- 웹 화면용 상단 툴바 -->
  <header class="screen-toolbar screen-only">

    <div class="toolbar-brand">

      <strong id="toolbarBrandName">
        BRAND
      </strong>

      <span id="toolbarGuidelineTitle">
        Brand Guidelines
      </span>

    </div>

    <div class="toolbar-controls">

      <span
        class="page-indicator"
        id="pageIndicator"
        aria-live="polite"
      >
        01 / --
      </span>

      <button
        type="button"
        class="toolbar-button"
        id="previousPageButton"
        aria-label="이전 페이지"
      >
        Previous
      </button>

      <button
        type="button"
        class="toolbar-button"
        id="nextPageButton"
        aria-label="다음 페이지"
      >
        Next
      </button>

      <button
        type="button"
        class="toolbar-button toolbar-button-dark"
        id="printButton"
        aria-label="PDF로 저장"
      >
        PDF 저장
      </button>

    </div>

  </header>


  <!--
    brand-data.js의 페이지 정보를 읽어
    app.js가 목차를 자동 생성합니다.
  -->
  <nav
    class="screen-navigation screen-only"
    id="screenNavigation"
    aria-label="브랜드 가이드라인 목차"
  ></nav>


  <!--
    app.js가 A4 가로형 페이지 전체를
    이 영역 안에 자동으로 생성합니다.
  -->
  <main
    class="guideline-document"
    id="guideline"
    aria-label="브랜드 가이드라인 문서"
  ></main>


  <noscript>
    <div class="noscript-message">
      이 페이지를 확인하려면 브라우저의 JavaScript 기능을 활성화해 주세요.
    </div>
  </noscript>


  <!-- 브랜드별 교체 데이터 -->
  <script
    src="./js/brand-data.js"
    defer
  ></script>

  <!-- 페이지 생성 및 인터랙션 -->
  <script
    src="./js/app.js"
    defer
  ></script>

</body>
</html>
